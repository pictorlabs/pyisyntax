name: Wheels

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  wheels:
    name: Build wheel (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest      # x86_64
          - os: ubuntu-24.04-arm   # aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build wheel
        run: uv build --wheel --out-dir dist

      - name: Publish wheel to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" --verify-tag --title "$TAG" \
            --notes "Prebuilt pyisyntax wheels for $TAG (aarch64 + x86_64 Linux)." || true
          gh release upload "$TAG" dist/*.whl --clobber
